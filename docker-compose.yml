version: '3.8'
services:
  vocpi:
    build: .
    image: vocpi:latest
    container_name: vocpi_app
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-sidecar:4317"
      OTEL_SERVICE_NAME: "vocpi"
    volumes:
      - ./app:/app
    working_dir: /app
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    depends_on:
      - otel-sidecar

  otel-sidecar:
      image: otel/opentelemetry-collector-contrib:latest
      container_name: otel-collector
      command:
        - '--config=/etc/otelcol-contrib/collector.yaml'
      volumes:
        - ./otel:/etc/otelcol-contrib:ro
      ports:
        - '4317:4317'   # OTLP gRPC
        - '4318:4318'   # OTLP HTTP
        - '9464:9464'   # Prometheus scrape endpoint
      depends_on:
        - jaeger

  jaeger:
    image: jaegertracing/jaeger:2.4.0
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - '16686:16686' # Jaeger UI