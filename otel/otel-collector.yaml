receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:

exporters:
  debug:
    verbosity: detailed
  prometheus:
    endpoint: "0.0.0.0:9464"
  otlp/jaeger:
    # endpoint: "host.containers.internal:14317"
    endpoint: "jaeger:4317" # Use the container name + the internal OTLP port
    tls:
      insecure: true
  otlphttp:
    endpoint: "http://otlp.nr-data.net:4318"
    headers:
      api-key: "eu01xxca66c702ebc68a9dd3dda222eaFFFFNRAL"

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp, prometheus, debug]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, otlphttp, debug]

    logs:
      receivers: [otlp]
      processors: []
      exporters: [otlphttp, debug]
